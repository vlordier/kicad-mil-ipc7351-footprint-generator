# MIL-Grade Preset Profile: Density A (Maximum)
# For high-reliability / MIL-STD / aerospace applications
# Applies stricter requirements per MIL-PRF and IPC Class 3

name: "MIL Grade A"
description: "Maximum reliability profile for MIL-STD, aerospace, and IPC Class 3 applications"
density: "A"
ipc_version: "C"

settings:
  # Courtyard: stricter than nominal Density A
  courtyard_expansion: 0.50  # mm (standard Density A)
  courtyard_assembly_expansion: 0.60  # mm (extra 0.1mm for MIL)

  # Solder fillet: J-STD-001 Class 3 minimums
  solder_fillet_toe_min: 0.30  # mm
  solder_fillet_heel_min: 0.15  # mm

  # Annular ring: larger than nominal
  annular_ring_min: 0.05  # mm (IPC-6012 Class 3)
  annular_ring_extra: 0.10  # mm (additional for MIL)

  # Pad geometry
  pad_corner_radius: 0.15  # mm (rounded to reduce stress)
  pad_shape: "rounded_rect"

  # Tolerance method: worst-case for MIL
  tolerance_method: "min_max"
  tolerance_stacking: "worst_case"

  # Solder mask
  mask_expansion: 0.05  # mm (tight)
  paste_reduction: 0.02  # mm (fine pitch)

  # Naming
  naming_prefix: "MIL_"
  naming_suffix: "_IPC7351C"

  # Derating
  vibration_derating: true
  large_fillet: true
  anchor_pads: false

  # Documentation
  generate_report: true
  report_include_formulas: true

notes:
  - "Density A selected for maximum solder joint strength"
  - "Courtyard expanded by 0.60mm for assembly tolerance"
  - "Annular ring increased for IPC Class 3 compliance"
  - "Worst-case tolerance stacking for critical MIL paths"
  - "Rounded pad corners to reduce stress risers under vibration"
